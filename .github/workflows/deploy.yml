# CI/CD: on every push to main, SSH into the EC2 and redeploy the backend.
# The image is rebuilt ON the server (docker compose ... up -d --build).
#
# Required GitHub repo secrets (Settings > Secrets and variables > Actions):
#   EC2_HOST     - the EC2 public IP (e.g. 13.49.22.101)
#   EC2_USER     - the SSH user (Ubuntu: "ubuntu"; Amazon Linux: "ec2-user")
#   EC2_SSH_KEY  - the PRIVATE SSH key (full contents) whose public half is in
#                  the EC2's ~/.ssh/authorized_keys
#   EC2_APP_DIR  - path to the cloned backend repo on the EC2 (e.g. /home/ubuntu/Cognos-Backend)
name: Deploy backend to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger a deploy manually from the Actions tab

concurrency:
  group: deploy-backend     # never run two deploys at once
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_DIR="${{ secrets.EC2_APP_DIR }}"
            # First run (or folder deleted): clone. Otherwise: pull latest.
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/ahmedraza-96/Cognos-Backend.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
